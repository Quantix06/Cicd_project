version: "3.1"

services:
  backend:
    build:
      context: .
      dockerfile: DockerfileBackend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - docker.env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/users'')"',
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  react:
    image: react
    build:
      context: .
      dockerfile: DockerfileReact
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - REACT_APP_SERVER_PORT=8000
    depends_on:
      backend:
        condition: service_healthy
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
