version: "3.1"

services:
  db:
    image: mysql:9.7
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    env_file:
      - docker.env
    healthcheck:
      test: 'mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute "SHOW DATABASES;" || exit 1'
      start_period: 3s
      timeout: 60s
      retries: 5
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    #    env_file:
    #      - docker.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'php -r "exit(@file_get_contents(''http://localhost:8080'') === false ? 1 : 0);"',
        ]
      start_period: 3s
  backend:
    image: python:3.12-slim
    restart: always
    # Installation des 3 packages et lancement de l'API avec Uvicorn
    command: sh -c "pip install mysql-connector-python fastapi uvicorn && uvicorn main:app --proxy-headers --host 0.0.0.0 --port 8000"
    # On expose le port 8000 pour pouvoir appeler l'API depuis la machine hôte
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - docker.env
    environment:
      MYSQL_HOST: db
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/users'')"',
        ]
      start_period: 3s

  react:
    image: react
    build:
      context: .
      dockerfile: DockerfileReact
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - REACT_APP_SERVER_PORT=8000
    depends_on:
      - backend
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      start_period: 10s
  healthcheck_everyone:
    image: nginx
    depends_on:
      adminer:
        condition: service_healthy
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
volumes:
  db_data:
